method: bayes
metric:
  name: "val/f1"
  goal: maximize

program: unet_evaluation.py
run_cap: 50
command:
  - python
  - ${program}
  - --config
  - config.yaml
  - --mode
  - single
  - --subject
  - "P002"
  - ${args}

parameters:
  # Model architecture
  model.unet1d.base_channels:
    values: [32, 48, 64, 80, 96]

  model.unet1d.depth:
    values: [4, 5, 6, 7]

  model.unet1d.dropout:
    distribution: uniform
    min: 0.05
    max: 0.3

  # Training
  trainer.lr:
    distribution: log_uniform
    min: -12.0  # ~6e-6
    max: -9.0   # ~1e-4

  trainer.weight_decay:
    distribution: log_uniform
    min: -5.0   # 0.00001
    max: -2.0   # 0.01

  # Loss function
  trainer.loss:
    values: ["bce", "weighted_bce", "focal", "dice"]

  # Data sampling
  trainer.sampler:
    values: ["normal", "undersample", "weighted"]