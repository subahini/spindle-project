program: cnn_train.py


command:
    - ${env}
    - python
    - ${program}
    - --config
    - config.yaml
    - ${args}

method: bayes
metric:
  name: val_f1
  goal: maximize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 3e-3
  weight_decay:
    values: [0, 1e-6, 1e-5, 1e-4]
  batch_size:
    values: [32, 64, 128]
  loss_name:
    values: ["focal", "weighted_bce", "bce"]
  sampling:
    values: ["none", "downsample"]